EXPERIMENT_NAME: 'train-teacher-rain-syn'

SAVE:
  TOP_K: -1

DATASET:
  DATAROOT: '../nuscenes'
  LOAD:
    GT:
      POSE: False
  WEATHER:
    TRAIN:
      - day-clear      # source for day-clear->day-rain translation (synthetic rain anchors)
      - day-rain       # real rain
      - night-rain     # real rain (night)
  AUGMENTATION:
    GAUSSIAN_NOISE:
      PROBABILITY: 0.5
    NORMALIZE:
      MODE: 'Daytime'
    DAY_CLEAR_DAY_RAIN_TRANSLATION:
      PROBABILITY: 0.5

TRAINING:
  BATCH_SIZE: 16
  SELF_DISTILL: True   # freeze pose network (depth student only)

LOAD:
  # Warm-start the depth/pose from md4allDD (strong adverse prior absorbed from synthetic data)
  INIT_CHECKPOINT_PATH: 'log/checkpoints/md4allDDa_nuscenes.ckpt'
  # Pseudo-label provider = md4allDD: reliable on the clear source of synthetic rain AND
  # strong on REAL rain, giving the student a strong rain anchor (clear_teacher is weaker here).
  # Matches the original self-distill convention (teacher == init model).
  DAYTIME_TRANSLATION_TEACHER_PATH: 'log/checkpoints/md4allDDa_nuscenes.ckpt'
  DAY_CLEAR_DAY_RAIN_TRANSLATION_PATH: '../nuScenes_translated/rain'

LOSS:
  SUPERVISED:
    WEIGHT: 1.0
    METHOD: 'unc_sim'
    TEACHER_NUM: 1     # single-teacher expert training with uncertainty
  VELOCITY_WEIGHT: 0.0

SYSTEM:
  NUM_WORKERS: 8
